services:
  etheriatimes:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: etheriatimes:latest
    container_name: etheriatimes
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "8080:8080"
    environment:
      NODE_ENV: production
      ENVIRONMENT: production
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: aether
      DB_NAME: etheria_account
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_URL: postgresql://aether:${DB_PASSWORD:-password}@db:5432/etheria_account
      JWT_SECRET: ${JWT_SECRET:-default-secret-change-in-production}
      SERVER_PORT: 8080
      NEXT_PUBLIC_API_URL: http://localhost:8080
      NEXT_PUBLIC_ENVIRONMENT: production
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      GIN_MODE: release
    volumes:
      - ./scripts:/app/scripts
      - ./logs:/app/logs
    working_dir: /app
    command: ["/entrypoint-cloud.sh"]
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health 2>/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5G
        reservations:
          cpus: "0.5"
          memory: 512M

  db:
    image: postgres:16-alpine
    container_name: etheriatimes-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: aether
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: etheria_account
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aether -d etheria_account"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

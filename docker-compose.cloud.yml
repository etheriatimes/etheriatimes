services:
  redis:
    image: docker.io/library/redis:8-alpine
    command:
      - redis-server
      - --loglevel
      - warning
      - --requirepass
      - ${REDIS_PASSWORD:-redis-default-password}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - redis-data:/data
    expose:
      - "6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}

  server:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: etheriatimes/etheriatimes:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    command: server
    expose:
      - "3000"
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"

      HOST: ${DOMAIN_HOST:-localhost}
      FRONTEND_PORT: "3000"
      API_PORT: "8080"

      LISTEN__TRUSTED_PROXY_CIDRS: 0.0.0.0/0,::/0

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: etheriatimes:v1
      REDIS_DEFAULT_TTL: "300"

      DATABASE_URL: ${DATABASE_URL}

      MEDIA_DIR: /app/data/media
      CERTS_DIR: /app/data/certs
      TEMPLATES_DIR: /app/data/templates
    volumes:
      - app-media:/app/data/media
      - app-certs:/app/data/certs
      - app-templates:/app/data/templates
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.cloud
    image: etheriatimes/etheriatimes:${APP_IMAGE_TAG:-cloud}
    env_file:
      - .env
    restart: unless-stopped
    command: worker
    expose:
      - "8080"
    environment:
      NODE_ENV: production
      USE_EMBEDDED_DB: "false"

      HOST: ${DOMAIN_HOST:-localhost}

      REDIS_ENABLED: "true"
      REDIS_REQUIRED: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis-default-password}
      REDIS_DB: "0"
      REDIS_URL: redis://default:${REDIS_PASSWORD:-redis-default-password}@redis:6379/0
      REDIS_KEY_PREFIX: etheriatimes:v1

      DATABASE_URL: ${DATABASE_URL}

      MEDIA_DIR: /app/data/media
      CERTS_DIR: /app/data/certs
      TEMPLATES_DIR: /app/data/templates
    volumes:
      - app-media:/app/data/media
      - app-certs:/app/data/certs
      - app-templates:/app/data/templates
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
  app-media:
  app-certs:
  app-templates: